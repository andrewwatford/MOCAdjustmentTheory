name: Tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package and test dependencies
        run: python -m pip install -e '.[test]'
      - name: Run tests
        run: python -m pytest
      - name: Install idealized-notebook dependencies
        if: matrix.python-version == '3.12'
        run: python -m pip install cmocean ipykernel matplotlib nbconvert
      - name: Execute data-free worked example
        if: matrix.python-version == '3.12'
        run: >-
          jupyter nbconvert --to notebook --execute
          --output-dir=/tmp --output=idealized.ipynb
          --ExecutePreprocessor.timeout=600
          notebooks/01_idealized_non_itf_adjustment.ipynb
