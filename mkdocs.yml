site_name: MOC Adjustment Theory
site_description: Modular models of meridional-overturning-circulation adjustment
site_url: https://andrewwatford.github.io/MOCAdjustmentTheory/
repo_url: https://github.com/andrewwatford/MOCAdjustmentTheory

theme:
  name: material

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
  - https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js
  - javascripts/mermaid.js

nav:
  - Home: index.md
  - Geometry: geometry.md
  - Core API: core_api.md
  - Model architecture: specifications/model_architecture.md

strict: true
